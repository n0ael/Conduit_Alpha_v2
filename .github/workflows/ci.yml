# Sanitizer-CI (CLAUDE.md 13.4) — TSan ist unter Windows nicht verfügbar,
# daher laufen TSan und ASan auf Ubuntu-Runnern bei jedem Push.
# Die Tests laufen headless ohne Audio-Device — kein ASIO/JACK-Setup nötig.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  sanitizers:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # halt_on_error=1: jedes Data Race bricht den Lauf sofort rot ab
          - preset: tsan
            tsan-options: halt_on_error=1
            asan-options: ""
          # detect_leaks=0: LSan würde JUCE-Singletons melden — Leak-Erkennung
          # übernimmt der JUCE-LeakDetector in den Klassen selbst
          - preset: asan-linux
            tsan-options: ""
            asan-options: detect_leaks=0

    steps:
      - uses: actions/checkout@v4

      - name: JUCE-Linux-Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: FetchContent-Sources cachen (JUCE + Catch2)
        uses: actions/cache@v4
        with:
          path: build-*/_deps/*-src
          key: deps-src-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build (nur ConduitTests — die GUI-App braucht die CI nicht)
        run: cmake --build --preset ${{ matrix.preset }} --target ConduitTests

      - name: Tests unter ${{ matrix.preset }}
        env:
          TSAN_OPTIONS: ${{ matrix.tsan-options }}
          ASAN_OPTIONS: ${{ matrix.asan-options }}
        run: ctest --preset ${{ matrix.preset }}
